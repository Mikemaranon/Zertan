{% set page_id = "profile" %}
{% extends "base.html" %}
{% block content %}
<section class="panel stack-gap">
    <div class="section-heading">
        <div>
            <h2>Performance profile</h2>
            <p class="muted">Formal exam KPIs across your submitted attempts.</p>
        </div>
    </div>
    <div id="profile-kpis" class="grid grid--kpis"></div>
</section>

<section class="grid grid--two">
    <div class="panel">
        <h2>By exam</h2>
        <div id="profile-by-exam" class="list-stack"></div>
    </div>
    <div class="panel">
        <h2>By question type</h2>
        <div id="profile-by-type" class="list-stack"></div>
    </div>
</section>
{% endblock %}
