services:
  zertan:
    image: ${ZERTAN_IMAGE:-zertan:local}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${HOST_PORT:-5050}:5050"
    environment:
      PORT: 5050
      SECRET_KEY: ${SECRET_KEY:-change-this-before-production}
      ZERTAN_DATA_DIR: /data
      ZERTAN_SEED_DEMO_CONTENT: ${ZERTAN_SEED_DEMO_CONTENT:-1}
      ZERTAN_BOOTSTRAP_ADMIN_USERNAME: ${ZERTAN_BOOTSTRAP_ADMIN_USERNAME:-admin}
      ZERTAN_BOOTSTRAP_ADMIN_PASSWORD: ${ZERTAN_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      ZERTAN_BOOTSTRAP_ADMIN_EMAIL: ${ZERTAN_BOOTSTRAP_ADMIN_EMAIL:-admin@zertan.local}
      ZERTAN_COOKIE_SECURE: ${ZERTAN_COOKIE_SECURE:-false}
      ZERTAN_COOKIE_SAMESITE: ${ZERTAN_COOKIE_SAMESITE:-Lax}
      ZERTAN_JWT_HOURS: ${ZERTAN_JWT_HOURS:-8}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - zertan_data:/data
    restart: unless-stopped

volumes:
  zertan_data:
