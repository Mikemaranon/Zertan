<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zertan Client</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="client-body">
    <main class="client-shell">
        <section class="client-card client-card--hero">
            <div class="client-identity">
                <img class="client-logo" src="./assets/Zertan.png" alt="Zertan">
                <div>
                    <p class="eyebrow">Zertan client</p>
                    <h1>Connect to a Zertan server</h1>
                    <p class="muted">
                        Pick a registered server or add a new one before opening the study workspace.
                    </p>
                </div>
            </div>
            <button id="open-server-modal" class="button button--primary" type="button">Add server</button>
        </section>

        <section class="client-card">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Registered servers</p>
                    <h2>Available connections</h2>
                </div>
                <p id="status-message" class="muted" aria-live="polite"></p>
            </div>
            <div id="server-error" class="error-message" hidden></div>
            <div id="server-list" class="server-list"></div>
        </section>
    </main>

    <div id="server-modal" class="client-modal" hidden>
        <div id="server-modal-backdrop" class="client-modal__backdrop"></div>
        <div class="client-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="server-modal-title">
            <button id="server-modal-close" class="client-modal__close" type="button" aria-label="Close server form">Close</button>
            <form id="server-form" class="client-modal__body">
                <div class="section-heading section-heading--compact">
                    <div>
                        <p class="eyebrow">Server details</p>
                        <h2 id="server-modal-title">Add server</h2>
                    </div>
                </div>

                <label><span>Name</span><input id="server-name" type="text" maxlength="80" required></label>
                <label><span>IP or DNS</span><input id="server-host" type="text" maxlength="255" required></label>
                <label><span>Port</span><input id="server-port" type="number" min="1" max="65535" value="5050" required></label>

                <div id="server-modal-error" class="error-message" hidden></div>

                <div class="modal-actions">
                    <button id="server-modal-cancel" class="button button--secondary" type="button">Cancel</button>
                    <button class="button button--primary" type="submit">Save server</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
