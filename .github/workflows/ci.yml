name: CI

on:
  push:
    tags-ignore:
      - "v*"
      - "desktop-v*"
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: true

env:
  ZERTAN_BOOTSTRAP_ADMIN_PASSWORD: ci-admin-password
  ZERTAN_SEED_DEMO_CONTENT: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -r app/requirements.txt

      - name: Run test suite
        run: python -m unittest discover -s tests

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: false
          tags: zertan:ci
          cache-from: type=gha,scope=ci-docker
          cache-to: type=gha,mode=max,scope=ci-docker
